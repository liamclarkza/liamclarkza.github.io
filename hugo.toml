baseURL = "https://liamjamesclark.com/"
locale = "en-GB"
title = "Liam Clark"
theme = "personal"
enableRobotsTXT = true

[params]
  author = "Liam Clark"
  description = "A home for Liam Clark's projects, notes, and experience."
  github = "https://github.com/liamclarkza"

[permalinks]
  projects = "/projects/:slug/"
  notes = "/notes/:slug/"

[menus]
  [[menus.main]]
    name = "Home"
    pageRef = "/"
    weight = 10
  [[menus.main]]
    name = "Projects"
    pageRef = "/projects"
    weight = 20
  [[menus.main]]
    name = "Résumé"
    pageRef = "/resume"
    weight = 30
  [[menus.main]]
    name = "Notes"
    pageRef = "/notes"
    weight = 40

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
