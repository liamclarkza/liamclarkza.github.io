<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if not .IsHome }}{{ .Title }} - {{ end }}{{ .Site.Title }}</title>
    <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Source Serif 4", serif;
            font-optical-sizing: auto;
            line-height: 1.6;
            color: #333;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: #fff;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 1rem 20px;
        }
        .site-title {
            font-family: "Source Serif 4", serif;
            font-optical-sizing: auto;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            color: #333;
        }
        .nav-links {
            display: flex;
            list-style: none;
        }
        .nav-links li {
            margin-left: 2rem;
        }
        .nav-links a {
            font-family: "Nunito", sans-serif;
            font-optical-sizing: auto;
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #666;
        }
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            padding: 5px;
            position: relative;
            width: 35px;
            height: 25px;
        }
        .hamburger span {
            width: 25px;
            height: 3px;
            background: #333;
            border-radius: 2px;
            position: absolute;
            transition: 0.3s;
        }
        .hamburger span:nth-child(1) {
            top: 0;
        }
        .hamburger span:nth-child(2) {
            top: 50%;
            transform: translateY(-50%);
        }
        .hamburger span:nth-child(3) {
            bottom: 0;
        }
        .mobile-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .mobile-menu.active {
            display: flex;
        }
        .mobile-menu a {
            font-family: "Nunito", sans-serif;
            font-optical-sizing: auto;
            text-decoration: none;
            color: #333;
            font-size: 1.5rem;
            margin: 1rem 0;
            font-weight: 500;
        }
        .hamburger.active span:nth-child(1) {
            top: 50%;
            transform: translateY(-50%) rotate(45deg);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            bottom: 50%;
            transform: translateY(50%) rotate(-45deg);
        }
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .hamburger {
                display: flex;
            }
        }
        main {
            margin-bottom: 2rem;
        }
        .blog-header {
            margin-bottom: 3rem;
        }
        .blog-title {
            font-family: "Source Serif 4", serif;
            font-optical-sizing: auto;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #333;
        }
        .blog-subtitle {
            font-family: "Source Serif 4", serif;
            font-optical-sizing: auto;
            font-style: italic;
            font-size: 1.1rem;
            color: #666;
            margin: 0;
        }
        .blog-posts {
            max-width: none;
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .blog-post-item {
            display: flex;
            margin-bottom: 1.5rem;
            align-items: flex-start;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 1rem;
            border-radius: 4px;
        }
        .blog-post-item:hover {
            background-color: #f8f8f8;
        }
        .blog-post-item:hover .post-title a {
            color: #666;
        }
        .post-date {
            flex-shrink: 0;
            width: 90px;
            margin-right: 2rem;
        }
        .post-date time {
            font-family: "Nunito", sans-serif;
            font-optical-sizing: auto;
            font-size: 0.9rem;
            color: #999;
            font-weight: 400;
        }
        .post-content {
            flex: 1;
        }
        .post-title {
            margin: 0 0 0.5rem 0;
            font-family: "Source Serif 4", serif;
            font-optical-sizing: auto;
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.3;
        }
        .post-title a {
            text-decoration: none;
            color: #333;
        }
        .post-title a:hover {
            color: #666;
        }
        .post-description {
            font-family: "Nunito", sans-serif;
            font-optical-sizing: auto;
            font-size: 1rem;
            color: #777;
            margin: 0;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="{{ .Site.BaseURL }}" class="site-title">{{ .Site.Title }}</a>

            <ul class="nav-links">
                <li><a href="{{ .Site.BaseURL }}">Home</a></li>
                <li><a href="{{ .Site.BaseURL }}about/">About</a></li>
                <li><a href="{{ .Site.BaseURL }}blog/">Blog</a></li>
            </ul>

            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <div class="mobile-menu" id="mobile-menu">
        <a href="{{ .Site.BaseURL }}">Home</a>
        <a href="{{ .Site.BaseURL }}about/">About</a>
        <a href="{{ .Site.BaseURL }}blog/">Blog</a>
    </div>

    <main class="container">
        {{ block "main" . }}{{ end }}
    </main>

    <script>
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');

        function closeMobileMenu() {
            hamburger.classList.remove('active');
            mobileMenu.classList.remove('active');
        }

        hamburger.addEventListener('click', function() {
            hamburger.classList.toggle('active');
            mobileMenu.classList.toggle('active');
        });

        // Close menu when clicking on a link
        const mobileLinks = mobileMenu.querySelectorAll('a');
        mobileLinks.forEach(link => {
            link.addEventListener('click', closeMobileMenu);
        });

        // Close menu when clicking outside
        mobileMenu.addEventListener('click', function(e) {
            if (e.target === mobileMenu) {
                closeMobileMenu();
            }
        });

        // Close menu and reset when window is resized to desktop
        window.addEventListener('resize', function() {
            if (window.innerWidth > 768) {
                closeMobileMenu();
            }
        });
    </script>
</body>
</html>
