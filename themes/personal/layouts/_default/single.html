{{ define "main" }}
<article>
    <header>
        <h1>{{ .Title }}</h1>
        <div class="meta">
            <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
        </div>
    </header>

    <div class="content">
        {{ .Content }}
    </div>
</article>
{{ end }}
